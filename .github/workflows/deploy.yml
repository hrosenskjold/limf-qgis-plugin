name: Package og Deploy QGIS Plugin

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Læs metadata
        id: meta
        run: |
          echo "VERSION=$(grep '^version=' metadata.txt | cut -d= -f2 | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "NAME=$(grep '^name=' metadata.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "DESC=$(grep '^description=' metadata.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "ABOUT=$(grep '^about=' metadata.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "QGIS_MIN=$(grep '^qgisMinimumVersion=' metadata.txt | cut -d= -f2 | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "AUTHOR=$(grep '^author=' metadata.txt | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Pak plugin som zip
        run: |
          mkdir -p build/limf_tools
          # Kopier alle plugin-filer ind i undermappen limf_tools/
          rsync -av --exclude='.git' --exclude='.github' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='build' --exclude='.gitignore' \
            --exclude='.claude' \
            . build/limf_tools/
          cd build
          zip -r limf_tools.zip limf_tools/

      - name: Generer plugins.xml
        run: |
          PAGES_URL="https://hrosenskjold.github.io/limf-qgis-plugin"
          REPO="${{ github.repository }}"
          VERSION="${{ steps.meta.outputs.VERSION }}"
          NAME="${{ steps.meta.outputs.NAME }}"
          DESC="${{ steps.meta.outputs.DESC }}"
          ABOUT="${{ steps.meta.outputs.ABOUT }}"
          QGIS_MIN="${{ steps.meta.outputs.QGIS_MIN }}"
          AUTHOR="${{ steps.meta.outputs.AUTHOR }}"

          cat > build/plugins.xml << EOF
          <?xml version = '1.0' encoding = 'UTF-8'?>
          <plugins>
            <pyqgis_plugin name="${NAME}" version="${VERSION}">
              <description>${DESC}</description>
              <about>${ABOUT}</about>
              <version>${VERSION}</version>
              <qgis_minimum_version>${QGIS_MIN}</qgis_minimum_version>
              <homepage>https://github.com/${REPO}</homepage>
              <file_name>limf_tools.zip</file_name>
              <icon>icon.png</icon>
              <author_name>${AUTHOR}</author_name>
              <download_url>${PAGES_URL}/limf_tools.zip</download_url>
              <experimental>True</experimental>
              <deprecated>False</deprecated>
              <tracker>https://github.com/${REPO}/issues</tracker>
              <repository>https://github.com/${REPO}</repository>
              <tags>python</tags>
              <server>False</server>
            </pyqgis_plugin>
          </plugins>
          EOF

      - name: Deploy til GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true
